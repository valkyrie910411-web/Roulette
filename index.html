<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芮森性福抽獎轉盤</title>
    <style>
        /* =========================================
           1. 手機端預設設定 (Mobile First)
           ========================================= */
        body {
            font-family: "華康黑體", "DFHei", "DFHei-Bold", "DFLiHei-W5", "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            background: 
                radial-gradient(circle at top left, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                radial-gradient(circle at bottom right, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(50.35deg, #114d5e, #1f9273, #3fa0b1, #2dffc6);
            background-attachment: fixed;
        }

        /* 統一的同步漂浮動畫 */
        @keyframes syncFloat {
            0% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-12px); }
            100% { transform: translateX(-50%) translateY(0px); }
        }

        .header-section {
            position: fixed;
            top: 8vh; 
            left: 50%;
            width: 90%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: syncFloat 4s ease-in-out infinite;
        }

        #stageTitle {
            font-size: 54px; 
            color: #ffffff; 
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        #result {
            font-size: 32px; 
            color: #ffffff; 
            min-height: 90px; 
            text-align: center;
            text-shadow: 0 0 15px rgba(246,135,32,0.8), 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            line-height: 1.4; 
        }

        .prize-highlight {
            color: #f68720;
            font-size: 1.1em;
        }

        .nav-btn {
            position: fixed;
            bottom: 160px; 
            background: rgba(255, 255, 255, 0.15); 
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #fff;
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1);
        }

        #prevBtn { left: 30px; display: none; }
        #nextBtn { right: 30px; }

        .slider-viewport {
            width: 600px;
            height: 600px;
            position: fixed;
            bottom: -180px; 
            left: 50%;
            z-index: 10;
            animation: syncFloat 4s ease-in-out infinite;
        }

        .slider-track {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .wheel-stage {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 8px solid #ffffff; 
            background-color: #fff;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: wheelGlow 3s ease-in-out infinite;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #f68720; 
            z-index: 30;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4)); 
        }

        #spinBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background-color: #f68720; 
            color: #ffffff;
            border: 6px solid #ffffff; 
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
            letter-spacing: 2px;
            padding-left: 2px;
            font-family: inherit; 
        }

        #spinBtn:not(:disabled) {
            animation: buttonPulse 2s infinite;
        }

        #spinBtn:hover:not(:disabled) { 
            background-color: #ff9933; 
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #spinBtn:disabled {
            background-color: #888;
            border-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: translate(-50%, -50%) scale(1);
            animation: none; 
        }

        @keyframes wheelGlow {
            0% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 8px 30px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(45, 255, 198, 0.7), 0 8px 30px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 8px 30px rgba(0,0,0,0.5); }
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 12px rgba(246, 135, 32, 0.5), 0 6px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 28px rgba(246, 135, 32, 0.9), 0 6px 20px rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 12px rgba(246, 135, 32, 0.5), 0 6px 20px rgba(0,0,0,0.4); }
        }


        /* =========================================
           2. 平板直式專屬設定 (Tablet Portrait)
           ========================================= */
        @media (min-width: 768px) and (orientation: portrait) {
            .header-section {
                top: 10vh; /* 已經將文字往上拉高 */
            }
            #stageTitle { font-size: 72px; }
            #result { font-size: 42px; min-height: 120px; }

            .slider-viewport {
                bottom: -240px; 
                transform-origin: bottom center; 
                animation: tabletFloat 4s ease-in-out infinite;
            }

            .nav-btn {
                width: 80px; height: 80px; font-size: 3.5rem;
                bottom: 240px; 
            }
            #prevBtn { left: 40px; }
            #nextBtn { right: 40px; }
        }

        @keyframes tabletFloat {
            0% { transform: translateX(-50%) scale(1.4) translateY(0px); }
            50% { transform: translateX(-50%) scale(1.4) translateY(-10px); }
            100% { transform: translateX(-50%) scale(1.4) translateY(0px); }
        }


        /* =========================================
           3. 電腦端 / 平板橫屏專屬設定 (PC / Landscape)
           ========================================= */
        @media (min-width: 768px) and (orientation: landscape) {
            .header-section {
                top: 15vh; 
            }
            #stageTitle { font-size: 64px; }
            #result { font-size: 38px; min-height: 100px; }

            .slider-viewport {
                bottom: -100px; 
                animation: syncFloat 4s ease-in-out infinite; 
            }

            .nav-btn {
                width: 70px; height: 70px; font-size: 3rem;
                bottom: 200px; 
            }
            #prevBtn { left: 100px; }
            #nextBtn { right: 100px; }
        }

    </style>
</head>
<body>

    <button id="prevBtn" class="nav-btn">❮</button>
    <button id="nextBtn" class="nav-btn">❯</button>

                <canvas id="canvas0"></canvas>
            </div>
            <div class="wheel-stage">
                <canvas id="canvas1"></canvas>
            </div>
        </div>
    </div>
