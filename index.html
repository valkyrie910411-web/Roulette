<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芮森性福抽獎轉盤</title>
    <style>
        /* =========================================
           1. 共用與手機端預設設定 (Mobile First)
           ========================================= */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            background: 
                radial-gradient(circle at top left, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                radial-gradient(circle at bottom right, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(50.35deg, #114d5e, #1f9273, #3fa0b1, #2dffc6);
            background-attachment: fixed;
        }

        .header-section {
            position: fixed;
            top: 10vh; /* 稍微往上移一點，騰出空間給兩行文字 */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 90%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stageTitle {
            font-size: 54px; 
            font-weight: bold;
            color: #ffffff; 
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        #result {
            font-size: 32px; 
            font-weight: bold;
            color: #ffffff; 
            /* 加大預留高度，防止換行時排版跳動 */
            min-height: 90px; 
            text-align: center;
            text-shadow: 0 0 15px rgba(246,135,32,0.8), 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            /* 增加行高，讓「恭喜獲得」與「獎品」之間有呼吸空間 */
            line-height: 1.4; 
        }

        /* 將獎品名稱的顏色特別標示為橘色，增加視覺爽度 */
        .prize-highlight {
            color: #f68720;
            font-size: 1.1em;
        }

        .nav-btn {
            position: fixed;
            bottom: 120px;
            background: rgba(255, 255, 255, 0.15); 
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #fff;
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1);
        }

        #prevBtn { left: 30px; display: none; }
        #nextBtn { right: 30px; }

        .slider-viewport {
            width: 600px;
            height: 600px;
            position: fixed;
            bottom: -240px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .slider-track {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .wheel-stage {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            border-radius: 50%;
            border: 8px solid #ffffff; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            background-color: #fff;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #f68720; 
            z-index: 30;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4)); 
        }

        #spinBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background-color: #f68720; 
            color: #ffffff;
            border: 6px solid #ffffff; 
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
            letter-spacing: 2px;
            padding-left: 2px;
        }

        #spinBtn:hover { 
            background-color: #ff9933; 
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #spinBtn:disabled {
            background-color: #888;
            border-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: translate(-50%, -50%) scale(1);
        }

        /* =========================================
           2. 電腦端 (大螢幕) 專屬設定 (PC View)
           ========================================= */
        @media (min-width: 768px) {
            #stageTitle {
                font-size: 72px; 
                margin-top: 20px;
            }

            #result {
                font-size: 42px; 
                min-height: 120px; /* 電腦端字體變大，預留高度也要增加 */
            }

            .slider-viewport {
                transform: translateX(-50%) scale(1.6);
                transform-origin: bottom center; 
                bottom: -200px; 
            }

            .nav-btn {
                width: 80px;
                height: 80px;
                font-size: 3.5rem;
                bottom: 180px; 
            }

            #prevBtn { left: 80px; }
            #nextBtn { right: 80px; }
        }

    </style>
</head>
<body>

    <div class="header-section">
        <div id="stageTitle">見面禮轉盤</div>
        <div id="result"></div>
    </div>

    <button id="prevBtn" class="nav-btn">❮</button>
    <button id="nextBtn" class="nav-btn">❯</button>

    <div class="slider-viewport">
        <div class="pointer"></div>
        <button id="spinBtn">Start</button>
        
        <div class="slider-track" id="sliderTrack">
            <div class="wheel-stage">
                <canvas id="canvas0" width="600" height="600"></canvas>
            </div>
            <div class="wheel-stage">
                <canvas id="canvas1" width="600" height="600"></canvas>
            </div>
        </div>
    </div>

    <script>
      const spinBtn = document.getElementById('spinBtn');
      const resultDiv = document.getElementById('result');
      const stageTitle = document.getElementById('stageTitle');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const sliderTrack = document.getElementById('sliderTrack');

      const canvases = [
          document.getElementById('canvas0'),
          document.getElementById('canvas1')
      ];
      const contexts = [
          canvases[0].getContext('2d'),
          canvases[1].getContext('2d')
      ];

      const stagesData = [
          {
              title: "見面禮轉盤",
              prizes: [
                  { name: "100元折價券", weight: 20, color: "#0b6170" },
                  { name: "女優拍照", weight: 30, color: "#114d5e" },
                  { name: "銘謝惠顧", weight: 0, color: "#0b6170" },
                  { name: "心跳蔓越莓一錠", weight: 30, color: "#114d5e" },
                  { name: "Super72 一錠", weight: 20, color: "#084c59" } 
              ]
          },
          {
              title: "老司機轉盤",
              prizes: [
                  { name: "8折官網折價券", weight: 48, color: "#0b6170" },
                  { name: "7折官網折價券", weight: 38, color: "#114d5e" },
                  { name: "200元折價券", weight: 5, color: "#0b6170" },
                  { name: "飛機杯一入", weight: 5, color: "#114d5e" },
                  { name: "Super72 一盒", weight: 3, color: "#0b6170" },
                  { name: "全單折抵免單券", weight: 1, color: "#f68720" }  
              ]
          }
      ];

      let currentStageIndex = 0; 
      let isSpinning = false;
      let currentRotations = [0, 0];

      function drawEqualWheel(stageIndex) {
          const ctx = contexts[stageIndex];
          const canvas = canvases[stageIndex];
          const prizes = stagesData[stageIndex].prizes;
          const numSlices = prizes.length;
          const sliceAngle = (2 * Math.PI) / numSlices;
          
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = canvas.width / 2;

          for (let i = 0; i < numSlices; i++) {
              const angle = i * sliceAngle;

              ctx.beginPath();
              ctx.fillStyle = prizes[i].color;
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
              ctx.lineTo(centerX, centerY);
              ctx.fill();

              ctx.save();
              ctx.translate(centerX, centerY);
              ctx.rotate(angle + sliceAngle / 2);
              ctx.textAlign = "right";
              ctx.fillStyle = "#ffffff"; 
              
              const isManySlices = numSlices > 5;
              ctx.font = isManySlices ? "bold 18px sans-serif" : "bold 22px sans-serif";
              
              ctx.fillText(prizes[i].name, radius - 35, 8);
              ctx.restore();
          }
      }

      drawEqualWheel(0);
      drawEqualWheel(1);

      function getWeightedRandomIndex(prizes) {
          const totalWeight = prizes.reduce((sum, prize) => sum + prize.weight, 0);
          let randomNum = Math.random() * totalWeight;
          
          for (let i = 0; i < prizes.length; i++) {
              if (randomNum < prizes[i].weight) {
                  return i;
              }
              randomNum -= prizes[i].weight;
          }
          return prizes.length - 1;
      }

      function slideToStage(index) {
          if (isSpinning) return;

          currentStageIndex = index;
          
          stageTitle.style.opacity = 0;
          setTimeout(() => {
              stageTitle.textContent = stagesData[currentStageIndex].title;
              stageTitle.style.opacity = 1;
          }, 150);

          resultDiv.innerHTML = "";

          const translateX = currentStageIndex * -50;
          sliderTrack.style.transform = `translateX(${translateX}%)`;

          prevBtn.style.display = currentStageIndex === 0 ? 'none' : 'flex';
          nextBtn.style.display = currentStageIndex === stagesData.length - 1 ? 'none' : 'flex';
      }

      prevBtn.addEventListener('click', () => slideToStage(0));
      nextBtn.addEventListener('click', () => slideToStage(1));

      spinBtn.addEventListener('click', () => {
          if (isSpinning) return;
          isSpinning = true;
          spinBtn.disabled = true;
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          resultDiv.innerHTML = "";

          const prizes = stagesData[currentStageIndex].prizes;
          const numSlices = prizes.length;
          const sliceDegree = 360 / numSlices;
          const canvas = canvases[currentStageIndex];

          const winningIndex = getWeightedRandomIndex(prizes);

          const targetCenterAngle = (winningIndex * sliceDegree) + (sliceDegree / 2);
          
          let targetRotation = 270 - targetCenterAngle;
          if (targetRotation < 0) targetRotation += 360;

          const randomOffset = (Math.random() * (sliceDegree * 0.8)) - (sliceDegree * 0.4);
          targetRotation += randomOffset;

          const baseSpins = 5 * 360;
          const currentMod = currentRotations[currentStageIndex] % 360;
          
          let degreeToRotate = targetRotation - currentMod;
          if (degreeToRotate < 0) degreeToRotate += 360;

          const totalRotateDegree = baseSpins + degreeToRotate;
          currentRotations[currentStageIndex] += totalRotateDegree;

          canvas.style.transform = `rotate(${currentRotations[currentStageIndex]}deg)`;

          setTimeout(() => {
              isSpinning = false;
              spinBtn.disabled = false;
              prevBtn.disabled = false;
              nextBtn.disabled = false;
              
              // 在這裡將文字分成兩行，並替獎品加上 highlight class 來改變顏色
              resultDiv.innerHTML = `🎉 恭喜獲得<br><span class="prize-highlight">${prizes[winningIndex].name}</span>`;
          }, 4000);
      });
    </script>
</body>
</html>
