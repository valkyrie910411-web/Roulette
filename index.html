<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芮森性福抽獎轉盤</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }

       .wheel-wrapper {
    position: relative;
    width: 600px;  /* 從 400px 改為 600px */
    height: 600px; /* 從 400px 改為 600px */
    margin-bottom: 40px;
}

/* 轉盤頂部的指標也跟著放大 */
.pointer {
    position: absolute;
    top: -20px; /* 稍微往上拉一點 */
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;  /* 從 15px 變 20px */
    border-right: 20px solid transparent; /* 從 15px 變 20px */
    border-top: 40px solid #ff4d4d;       /* 從 30px 變 40px */
    z-index: 10;
}

        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            color: #fff;
            background-color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s;
            letter-spacing: 2px;
        }

        button:hover {
            background-color: #555;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>
    
    <button id="spinBtn">開始旋轉</button>
    <div id="result"></div>

    <script>
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const spinBtn = document.getElementById('spinBtn');
      const resultDiv = document.getElementById('result');

      const prizesData = [
          { name: "SUPER 72/1錠", weight: 20, color: "#FFB6C1" },
          { name: "心跳蔓越莓", weight: 20, color: "#FFDAB9" },
          { name: "折扣$100", weight: 20, color: "#E6E6FA" },
          { name: "折扣$200", weight: 20, color: "#ADD8E6" },
          { name: "銘謝惠顧", weight: 20, color: "#D3D3D3" }
      ];

      const totalWeight = prizesData.reduce((sum, prize) => sum + prize.weight, 0);

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = canvas.width / 2;

      let currentRotation = 0;
      let isSpinning = false;

      function drawWheel() {
          let currentAngle = 0;

          for (let i = 0; i < prizesData.length; i++) {
              const sliceAngle = (prizesData[i].weight / totalWeight) * 2 * Math.PI;

              ctx.beginPath();
              ctx.fillStyle = prizesData[i].color;
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
              ctx.lineTo(centerX, centerY);
              ctx.fill();

              ctx.save();
              ctx.translate(centerX, centerY);
              ctx.rotate(currentAngle + sliceAngle / 2);
              ctx.textAlign = "right";
              ctx.fillStyle = "#333";
              
             const isSmallSlice = (prizesData[i].weight / totalWeight) < 0.05;
ctx.font = isSmallSlice ? "bold 18px sans-serif" : "bold 24px sans-serif";

// 調整文字位置：radius - 30 讓字稍微遠離邊緣，8 讓字對齊中央
ctx.fillText(prizesData[i].name, radius - 30, 8);

ctx.restore();

              currentAngle += sliceAngle;
          }
      }

      drawWheel();

      spinBtn.addEventListener('click', () => {
          if (isSpinning) return;
          isSpinning = true;
          spinBtn.disabled = true;
          resultDiv.textContent = "";

          const baseSpins = 5 * 360;
          const randomDegree = Math.floor(Math.random() * 360);
          const totalRotateDegree = baseSpins + randomDegree;

          currentRotation += totalRotateDegree;

          canvas.style.transform = `rotate(${currentRotation}deg)`;

          setTimeout(() => {
              isSpinning = false;
              spinBtn.disabled = false;

              let pointerAngle = (270 - (currentRotation % 360)) % 360;
              if (pointerAngle < 0) pointerAngle += 360;

              let currentDegreeCheck = 0;
              let winningIndex = -1;

              for (let i = 0; i < prizesData.length; i++) {
                  const sliceDegree = (prizesData[i].weight / totalWeight) * 360;
                  
                  if (pointerAngle >= currentDegreeCheck && pointerAngle < currentDegreeCheck + sliceDegree) {
                      winningIndex = i;
                      break;
                  }
                  
                  currentDegreeCheck += sliceDegree;
              }

              resultDiv.textContent = `🎉 恭喜獲得：${prizesData[winningIndex].name}`;
          }, 4000);
      });
    </script>
</body>
</html>
