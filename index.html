<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芮森性福抽獎轉盤</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            overflow-x: hidden;
        }

        #stageTitle {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        /* 兩側切換按鈕 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.08);
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #555;
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            color: #111;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.05);
        }

        #prevBtn { left: 30px; display: none; }
        #nextBtn { right: 30px; }

        /* 滑動軌道容器 (限制寬度，隱藏超出範圍的轉盤) */
        .slider-viewport {
            width: 600px;
            overflow: hidden;
            margin-bottom: 40px;
            position: relative;
        }

        /* 實際滑動的軌道 */
        .slider-track {
            display: flex;
            width: 200%; /* 容納兩個 600px 的轉盤 (1200px) */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* 平滑滑動動畫 */
        }

        /* 單一個轉盤的包裝 */
        .wheel-stage {
            width: 600px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4d4d;
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            /* 旋轉動畫 */
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        button.spin-btn {
            padding: 12px 30px;
            font-size: 18px;
            color: #fff;
            background-color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s;
            letter-spacing: 2px;
        }

        button.spin-btn:hover { background-color: #555; }
        button.spin-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            min-height: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="prevBtn" class="nav-btn">❮</button>
    <button id="nextBtn" class="nav-btn">❯</button>

    <div id="stageTitle">第一階段</div>

    <div class="slider-viewport">
        <div class="slider-track" id="sliderTrack">
            <div class="wheel-stage">
                <div class="pointer"></div>
                <canvas id="canvas0" width="600" height="600"></canvas>
            </div>
            <div class="wheel-stage">
                <div class="pointer"></div>
                <canvas id="canvas1" width="600" height="600"></canvas>
            </div>
        </div>
    </div>
    
    <button id="spinBtn" class="spin-btn">開始旋轉</button>
    <div id="result"></div>

    <script>
      const spinBtn = document.getElementById('spinBtn');
      const resultDiv = document.getElementById('result');
      const stageTitle = document.getElementById('stageTitle');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const sliderTrack = document.getElementById('sliderTrack');

      // 取得兩個畫布
      const canvases = [
          document.getElementById('canvas0'),
          document.getElementById('canvas1')
      ];
      const contexts = [
          canvases[0].getContext('2d'),
          canvases[1].getContext('2d')
      ];

      // 定義獎項與機率 (Weight)
      const stagesData = [
          {
              title: "第一階段",
              prizes: [
                  { name: "SUPER 72/1錠", weight: 20, color: "#FFB6C1" },
                  { name: "心跳蔓越莓", weight: 20, color: "#FFDAB9" },
                  { name: "折扣$100", weight: 20, color: "#E6E6FA" },
                  { name: "折扣$200", weight: 20, color: "#ADD8E6" },
                  { name: "銘謝惠顧", weight: 20, color: "#D3D3D3" }
              ]
          },
          {
              title: "第二階段",
              // 總權重設定為 100，方便直接對應百分比
              prizes: [
                  { name: "9折", weight: 48, color: "#D3D3D3" },          // 佔 45% (普獎)
                  { name: "8折", weight: 40, color: "#E6E6FA" },          // 佔 32%
                  { name: "飛機杯", weight: 5, color: "#FFDAB9" },        // 佔 12%
                  { name: "SUPER 72", weight: 3, color: "#98FB98" },      // 佔 5%
                  { name: "買一送二", weight: 3, color: "#FFB6C1" },        // 佔 5%
                  { name: "整筆免單", weight: 1, color: "#FFD700" }         // 佔 1% (大獎)
              ]
          }
      ];

      let currentStageIndex = 0; 
      let isSpinning = false;
      
      // 記錄兩個轉盤各自累積的旋轉角度，避免切換回來時角度重置
      let currentRotations = [0, 0];

      // 繪製「均分」的黑箱轉盤
      function drawEqualWheel(stageIndex) {
          const ctx = contexts[stageIndex];
          const canvas = canvases[stageIndex];
          const prizes = stagesData[stageIndex].prizes;
          const numSlices = prizes.length;
          const sliceAngle = (2 * Math.PI) / numSlices;
          
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const radius = canvas.width / 2;

          for (let i = 0; i < numSlices; i++) {
              const angle = i * sliceAngle;

              // 畫扇形 (每個面積都一樣大)
              ctx.beginPath();
              ctx.fillStyle = prizes[i].color;
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
              ctx.lineTo(centerX, centerY);
              ctx.fill();

              // 畫文字
              ctx.save();
              ctx.translate(centerX, centerY);
              ctx.rotate(angle + sliceAngle / 2);
              ctx.textAlign = "right";
              ctx.fillStyle = "#333";
              
              // 依據字數動態調整大小
              const isManySlices = numSlices > 5;
              ctx.font = isManySlices ? "bold 20px sans-serif" : "bold 24px sans-serif";
              
              ctx.fillText(prizes[i].name, radius - 30, 8);
              ctx.restore();
          }
      }

      // 初始化畫出兩個轉盤
      drawEqualWheel(0);
      drawEqualWheel(1);

      // 加權隨機演算法 (黑箱核心)
      function getWeightedRandomIndex(prizes) {
          const totalWeight = prizes.reduce((sum, prize) => sum + prize.weight, 0);
          let randomNum = Math.random() * totalWeight;
          
          for (let i = 0; i < prizes.length; i++) {
              if (randomNum < prizes[i].weight) {
                  return i;
              }
              randomNum -= prizes[i].weight;
          }
          return prizes.length - 1;
      }

      // 執行滑動切換
      function slideToStage(index) {
          if (isSpinning) return;

          currentStageIndex = index;
          
          // 更新標題 (加入淡入淡出效果)
          stageTitle.style.opacity = 0;
          setTimeout(() => {
              stageTitle.textContent = stagesData[currentStageIndex].title;
              stageTitle.style.opacity = 1;
          }, 150);

          resultDiv.textContent = "";

          // 移動軌道 (0% 顯示第一個，-50% 顯示第二個)
          const translateX = currentStageIndex * -50;
          sliderTrack.style.transform = `translateX(${translateX}%)`;

          // 更新按鈕顯示狀態
          prevBtn.style.display = currentStageIndex === 0 ? 'none' : 'flex';
          nextBtn.style.display = currentStageIndex === stagesData.length - 1 ? 'none' : 'flex';
      }

      prevBtn.addEventListener('click', () => slideToStage(0));
      nextBtn.addEventListener('click', () => slideToStage(1));

      // 點擊抽獎
      spinBtn.addEventListener('click', () => {
          if (isSpinning) return;
          isSpinning = true;
          spinBtn.disabled = true;
          prevBtn.disabled = true; // 旋轉時鎖定切換按鈕
          nextBtn.disabled = true;
          resultDiv.textContent = "";

          const prizes = stagesData[currentStageIndex].prizes;
          const numSlices = prizes.length;
          const sliceDegree = 360 / numSlices;
          const canvas = canvases[currentStageIndex];

          // 1. 黑箱決定中獎項目
          const winningIndex = getWeightedRandomIndex(prizes);

          // 2. 計算轉盤必須停在哪個角度
          // 算出該獎項的圓心角度
          const targetCenterAngle = (winningIndex * sliceDegree) + (sliceDegree / 2);
          
          // 計算需要旋轉多少度才能對齊正上方(270度)
          let targetRotation = 270 - targetCenterAngle;
          if (targetRotation < 0) targetRotation += 360;

          // 加入隨機偏移，讓每次停下的位置不完全在扇形正中央 (看起來更自然)
          // 偏移量設定在扇形寬度的 80% 以內，確保不會超出邊界
          const randomOffset = (Math.random() * (sliceDegree * 0.8)) - (sliceDegree * 0.4);
          targetRotation += randomOffset;

          // 3. 加上基礎圈數 (5圈)
          const baseSpins = 5 * 360;
          const currentMod = currentRotations[currentStageIndex] % 360;
          
          let degreeToRotate = targetRotation - currentMod;
          if (degreeToRotate < 0) degreeToRotate += 360;

          const totalRotateDegree = baseSpins + degreeToRotate;
          currentRotations[currentStageIndex] += totalRotateDegree;

          // 執行旋轉
          canvas.style.transform = `rotate(${currentRotations[currentStageIndex]}deg)`;

          // 顯示結果
          setTimeout(() => {
              isSpinning = false;
              spinBtn.disabled = false;
              prevBtn.disabled = false;
              nextBtn.disabled = false;
              
              resultDiv.textContent = `🎉 恭喜獲得：${prizes[winningIndex].name}`;
          }, 4000);
      });
    </script>
</body>
</html>
