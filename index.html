<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芮森性福抽獎轉盤</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* =========================================
           1. 手機端預設設定 (Mobile First)
           ========================================= */
        body {
            font-family: "華康黑體", "DFHei", "DFHei-Bold", "DFLiHei-W5", "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            background: 
                radial-gradient(circle at top left, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                radial-gradient(circle at bottom right, #ec8427 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(50.35deg, #114d5e, #1f9273, #3fa0b1, #2dffc6);
            background-attachment: fixed;
        }

        /* 👑 免單大獎專屬：金黃色背景覆蓋層 */
        .golden-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #FFDF00 0%, #DAA520 70%, #B8860B 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 5; 
        }
        
        body.golden-mode .golden-overlay {
            opacity: 1;
        }

        /* 👑 免單大獎專屬：轉盤外框閃耀金黃色 */
        body.golden-mode .wheel-stage canvas {
            border-color: #FFF200 !important;
            animation: goldenGlow 1.5s ease-in-out infinite !important;
        }

        /* 👑 免單大獎專屬：文字結果變為純白搭配深色火光陰影 */
        body.golden-mode .prize-highlight {
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 30px #ff3300, 0 0 60px #ff0000;
            font-size: 1.25em; 
        }
        body.golden-mode #result {
            text-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 20px #e65c00;
        }

        /* 頂部文字區塊 */
        .header-section {
            position: fixed;
            top: 8vh; 
            left: 50%;
            transform: translateX(-50%); 
            width: 90%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stageTitle {
            font-size: 54px; 
            color: #ffffff; 
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        #result {
            font-size: 32px; 
            color: #ffffff; 
            min-height: 90px; 
            text-align: center;
            text-shadow: 0 0 15px rgba(246,135,32,0.8), 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            line-height: 1.4; 
            transition: all 0.5s ease;
        }

        .prize-highlight {
            color: #f68720;
            font-size: 1.1em;
            transition: all 0.5s ease;
        }

        .nav-btn {
            position: fixed;
            bottom: 160px; 
            background: rgba(255, 255, 255, 0.15); 
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #fff;
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1);
        }

        #prevBtn { left: 30px; display: none; }
        #nextBtn { right: 30px; }

        .slider-viewport {
            width: 600px;
            height: 600px;
            position: fixed;
            bottom: -240px; 
            left: 50%;
            z-index: 10;
            animation: wheelFloat 4s ease-in-out infinite;
        }

        .slider-track {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .wheel-stage {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .wheel-stage canvas {
            width: 100%;
            height: 100%;
            box-sizing: border-box; 
            border-radius: 50%;
            border: 8px solid #ffffff; 
            background-color: #fff;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1), border-color 0.5s;
            animation: wheelGlow 3s ease-in-out infinite;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #f68720; 
            z-index: 30;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4)); 
            transition: all 0.3s ease;
        }

        #spinBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background-color: #f68720; 
            color: #ffffff;
            border: 6px solid #ffffff; 
            border-radius: 50%;
            font-size: 28px;
            font-weight: 900; 
            cursor: pointer;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            padding-left: 2px;
            font-family: inherit; 
        }

        #spinBtn:not(:disabled) {
            animation: buttonPulse 2s infinite;
        }

        #spinBtn:hover:not(:disabled) { 
            background-color: #ff9933; 
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #spinBtn:disabled {
            background-color: #888;
            border-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: translate(-50%, -50%) scale(1);
            animation: none; 
        }

        @keyframes wheelFloat {
            0% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-12px); }
            100% { transform: translateX(-50%) translateY(0px); }
        }

        @keyframes wheelGlow {
            0% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 8px 30px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(45, 255, 198, 0.7), 0 8px 30px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 8px 30px rgba(0,0,0,0.5); }
        }

        @keyframes goldenGlow {
            0% { box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 8px 30px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 0 80px rgba(255,215,0,1), 0 8px 30px rgba(0,0,0,0.5); }
            100% { box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 8px 30px rgba(0,0,0,0.5); }
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 12px rgba(246, 135, 32, 0.5), 0 6px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 28px rgba(246, 135, 32, 0.9), 0 6px 20px rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 12px rgba(246, 135, 32, 0.5), 0 6px 20px rgba(0,0,0,0.4); }
        }


        /* =========================================
           2. 平板直式專屬設定 (Tablet Portrait)
           ========================================= */
        @media (min-width: 768px) and (orientation: portrait) {
            .header-section {
                top: 4vh; 
            }
            #stageTitle { font-size: 110px; margin-bottom: 25px; } 
            #result { font-size: 68px; min-height: 180px; } 

            .slider-viewport {
                width: 840px; 
                height: 840px;
                bottom: -252px; 
                animation: tabletFloat 4s ease-in-out infinite;
            }
            .wheel-stage { 
                width: 840px; 
                height: 840px; 
            }
            .wheel-stage canvas { border-width: 11px; }

            .pointer {
                top: -28px;
                border-left-width: 28px;
                border-right-width: 28px;
                border-top-width: 63px;
            }
            #spinBtn {
                width: 168px; 
                height: 168px; 
                border-width: 8px; 
                font-size: 44px; 
            }

            .nav-btn {
                width: 80px; height: 80px; font-size: 3.5rem;
                bottom: 240px; 
            }
            #prevBtn { left: 40px; }
            #nextBtn { right: 40px; }
        }

        @keyframes tabletFloat {
            0% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-16px); }
            100% { transform: translateX(-50%) translateY(0px); }
        }


        /* =========================================
           3. 電腦端 / 平板橫屏專屬設定 (PC / Landscape)
           ★ 縮小轉盤，放大文字，達到完美視覺平衡
           ========================================= */
        @media (min-width: 768px) and (orientation: landscape) {
            .header-section {
                top: 6vh; /* 確保上方留有舒適的呼吸空間 */
            }
            /* ★ 標題文字變得更大，達到 9vh 的霸氣尺寸 */
            #stageTitle { font-size: 9vh; margin-bottom: 2vh; } 
            #result { font-size: 5vh; min-height: 12vh; }

            .slider-viewport {
                /* ★ 將轉盤尺寸縮小至 80vh */
                width: 80vh; 
                height: 80vh;
                /* ★ 確保 Start 鍵完美落在底部 */
                bottom: -22vh; 
                animation: pcWheelFloat 4s ease-in-out infinite; 
            }
            .wheel-stage { 
                width: 80vh; 
                height: 80vh; 
            }
            .wheel-stage canvas { border-width: 1vh; }

            .pointer {
                top: -3vh;
                border-left-width: 3vh;
                border-right-width: 3vh;
                border-top-width: 7vh;
            }
            #spinBtn {
                width: 18vh; 
                height: 18vh; 
                border-width: 0.8vh; 
                font-size: 4vh; 
            }

            .nav-btn {
                width: 8vh; height: 8vh; font-size: 3.5vh;
                bottom: 22vh; 
            }
            /* 切換按鈕往兩側再退一點，避免跟大字體打架 */
            #prevBtn { left: 12vw; }
            #nextBtn { right: 12vw; }
        }

        @keyframes pcWheelFloat {
            0% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-1.5vh); }
            100% { transform: translateX(-50%) translateY(0px); }
        }

    </style>
</head>
<body>

    <div class="golden-overlay"></div>

    <div class="header-section">
        <div id="stageTitle">見面禮轉盤</div>
        <div id="result"></div>
    </div>

    <button id="prevBtn" class="nav-btn">❮</button>
    <button id="nextBtn" class="nav-btn">❯</button>

    <div class="slider-viewport">
        <div class="pointer"></div>
        <button id="spinBtn">Start</button>
        
        <div class="slider-track" id="sliderTrack">
            <div class="wheel-stage">
                <canvas id="canvas0"></canvas>
            </div>
            <div class="wheel-stage">
                <canvas id="canvas1"></canvas>
            </div>
        </div>
    </div>

    <script>
      const spinBtn = document.getElementById('spinBtn');
      const resultDiv = document.getElementById('result');
      const stageTitle = document.getElementById('stageTitle');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const sliderTrack = document.getElementById('sliderTrack');

      const canvases = [
          document.getElementById('canvas0'),
          document.getElementById('canvas1')
      ];
      const contexts = [
          canvases[0].getContext('2d'),
          canvases[1].getContext('2d')
      ];

      const stagesData = [
          {
              title: "見面禮轉盤",
              prizes: [
                  { name: "100元折價券", weight: 20, color: "#0b6170" },
                  { name: "模特拍照 一次", weight: 30, color: "#114d5e" },
                  { name: "銘謝惠顧", weight: 0, color: "#0b6170" },
                  { name: "心跳蔓越莓 一錠", weight: 30, color: "#114d5e" },
                  { name: "Super72 一錠", weight: 20, color: "#084c59" } 
              ]
          },
          {
              title: "老司機轉盤",
              prizes: [
                  { name: "8折官網折價券", weight: 48, color: "#0b6170" },
                  { name: "7折官網折價券", weight: 36, color: "#114d5e" },
                  { name: "200元折價券", weight: 5, color: "#0b6170" },
                  { name: "飛機杯 一入", weight: 7, color: "#114d5e" },
                  { name: "Super72 一盒", weight: 3, color: "#0b6170" },
                  { name: "全單折抵免單券", weight: 1, color: "#f68720" }  
              ]
          }
      ];

      const goldenColors = ["#FFDF00", "#DAA520", "#FFD700", "#B8860B", "#F4A460", "#FF8C00"];

      let currentStageIndex = 0; 
      let isSpinning = false;
      let currentRotations = [0, 0];

      function setupHighDPIProperties(canvas, ctx) {
          const dpr = window.devicePixelRatio || 1;
          const maxLogicalSize = 1600; 
          
          canvas.width = maxLogicalSize * dpr;
          canvas.height = maxLogicalSize * dpr;
          ctx.scale(dpr, dpr);
      }

      setupHighDPIProperties(canvases[0], contexts[0]);
      setupHighDPIProperties(canvases[1], contexts[1]);

      function drawEqualWheel(stageIndex, isGolden = false) {
          const ctx = contexts[stageIndex];
          const prizes = stagesData[stageIndex].prizes;
          const numSlices = prizes.length;
          const sliceAngle = (2 * Math.PI) / numSlices;
          
          const centerX = 800;
          const centerY = 800;
          const radius = 800;

          ctx.clearRect(0, 0, 1600, 1600);

          const fontConfig = "'華康黑體', 'DFHei', 'DFHei-Bold', 'DFLiHei-W5', 'Microsoft JhengHei', sans-serif";

          for (let i = 0; i < numSlices; i++) {
              const angle = i * sliceAngle;

              ctx.beginPath();
              ctx.fillStyle = isGolden ? goldenColors[i % goldenColors.length] : prizes[i].color;
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
              ctx.lineTo(centerX, centerY);
              ctx.fill();

              ctx.save();
              ctx.translate(centerX, centerY);
              ctx.rotate(angle + sliceAngle / 2);
              ctx.textAlign = "right";
              ctx.fillStyle = "#ffffff"; 
              
              const isManySlices = numSlices > 5;
              ctx.font = isManySlices ? `bold 48px ${fontConfig}` : `bold 59px ${fontConfig}`;
              
              ctx.fillText(prizes[i].name, radius - 93, 21);
              ctx.restore();
          }
      }

      drawEqualWheel(0);
      drawEqualWheel(1);

      function resetGoldenMode() {
          if (document.body.classList.contains('golden-mode')) {
              document.body.classList.remove('golden-mode');
              drawEqualWheel(0);
              drawEqualWheel(1);
          }
      }

      function getWeightedRandomIndex(prizes) {
          const totalWeight = prizes.reduce((sum, prize) => sum + prize.weight, 0);
          let randomNum = Math.random() * totalWeight;
          
          for (let i = 0; i < prizes.length; i++) {
              if (randomNum < prizes[i].weight) {
                  return i;
              }
              randomNum -= prizes[i].weight;
          }
          return prizes.length - 1;
      }

      function slideToStage(index) {
          if (isSpinning) return;

          resetGoldenMode(); 

          currentStageIndex = index;
          
          stageTitle.style.opacity = 0;
          setTimeout(() => {
              stageTitle.textContent = stagesData[currentStageIndex].title;
              stageTitle.style.opacity = 1;
          }, 150);

          resultDiv.innerHTML = "";

          const translateX = currentStageIndex * -50;
          sliderTrack.style.transform = `translateX(${translateX}%)`;

          prevBtn.style.display = currentStageIndex === 0 ? 'none' : 'flex';
          nextBtn.style.display = currentStageIndex === stagesData.length - 1 ? 'none' : 'flex';
      }

      prevBtn.addEventListener('click', () => slideToStage(0));
      nextBtn.addEventListener('click', () => slideToStage(1));

      spinBtn.addEventListener('click', () => {
          if (isSpinning) return;

          resetGoldenMode(); 

          isSpinning = true;
          spinBtn.disabled = true;
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          resultDiv.innerHTML = "";

          const prizes = stagesData[currentStageIndex].prizes;
          const numSlices = prizes.length;
          const sliceDegree = 360 / numSlices;
          const canvas = canvases[currentStageIndex];

          const winningIndex = getWeightedRandomIndex(prizes);

          const targetCenterAngle = (winningIndex * sliceDegree) + (sliceDegree / 2);
          
          let targetRotation = 270 - targetCenterAngle;
          if (targetRotation < 0) targetRotation += 360;

          const randomOffset = (Math.random() * (sliceDegree * 0.8)) - (sliceDegree * 0.4);
          targetRotation += randomOffset;

          const baseSpins = 5 * 360;
          const currentMod = currentRotations[currentStageIndex] % 360;
          
          let degreeToRotate = targetRotation - currentMod;
          if (degreeToRotate < 0) degreeToRotate += 360;

          const totalRotateDegree = baseSpins + degreeToRotate;
          currentRotations[currentStageIndex] += totalRotateDegree;

          canvas.style.transform = `rotate(${currentRotations[currentStageIndex]}deg)`;

          setTimeout(() => {
              isSpinning = false;
              spinBtn.disabled = false;
              prevBtn.disabled = false;
              nextBtn.disabled = false;
              
              resultDiv.innerHTML = `🎉 恭喜獲得<br><span class="prize-highlight">${prizes[winningIndex].name}</span>`;

              if (prizes[winningIndex].name === "全單折抵免單券") {
                  document.body.classList.add('golden-mode');
                  drawEqualWheel(currentStageIndex, true); 

                  const duration = 3000;
                  const animationEnd = Date.now() + duration;
                  const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000, colors: ['#FFD700', '#FFA500', '#FFFFFF', '#f68720'] };

                  function randomInRange(min, max) {
                      return Math.random() * (max - min) + min;
                  }

                  const interval = setInterval(function() {
                      const timeLeft = animationEnd - Date.now();
                      if (timeLeft <= 0) {
                          return clearInterval(interval);
                      }
                      const particleCount = 50 * (timeLeft / duration);
                      
                      confetti(Object.assign({}, defaults, { particleCount,
                          origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                      }));
                      confetti(Object.assign({}, defaults, { particleCount,
                          origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                      }));
                  }, 250);
              }

          }, 4000);
      });
    </script>
</body>
</html>
